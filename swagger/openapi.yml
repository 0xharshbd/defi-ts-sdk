  /defi/v1/bridge/quoteaggregator:
    get:
      tags:
        - bridge
      summary: Get Bridge Swap Quotes
      description: >-
        Retrieves a comprehensive list of swap quotations from multiple bridges
        for a specified token pair pool. By aggregating swap quotes across
        various bridges, it enables users to compare rates and identify the most
        favorable trading option. The response includes detailed information
        such as the Bridge name and identifier, the input amount, the swap path,
        and the resulting output amounts from each bridge, making it a valuable
        tool for pricing data and swap execution decisions.


        > 💡 

        **Compute Unit Value:** `85` (Fixed)
      operationId: bridgeQuotes_legacy
      parameters:
        - name: srcChainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique chain ID to specify the source chain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            example: '1'
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: dstChainId
          in: query
          required: true
          schema:
            type: string
            description: >-
              The unique chain ID to specify the destination chain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            example: '1'
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: srcChainSymbol
          in: query
          required: false
          schema:
            type: string
            description: Symbol of the source chain.
            example: ETH
          description: Symbol of the source chain.
        - name: srcTokenSymbol
          in: query
          required: false
          schema:
            type: string
            description: Symbol of the token to swap.
            example: usdt
          description: Symbol of the token to swap.
        - name: dstTokenSymbol
          in: query
          required: false
          schema:
            type: string
            description: Symbol of the token to be received after the swap.
            example: ETH
          description: Symbol of the token to be received after the swap.
        - name: srcTokenAddress
          in: query
          required: false
          schema:
            type: string
            description: Address of the source token.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Address of the source token.
        - name: dstTokenAddress
          in: query
          required: false
          schema:
            type: string
            description: Address of the destination token.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Address of the destination token.
        - name: amountIn
          in: query
          required: true
          schema:
            type: string
            description: Amount of the token to be swapped.
            example: '10000'
          description: Amount of the token to be swapped.
        - name: excludedBridges
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated values of bridges to exclude.
            example: '200'
          description: Comma-separated values of bridges to exclude.
        - name: vsCurrencies
          in: query
          required: false
          schema:
            type: string
            description: >-
              A comma-separated list of currency symbols to convert the amount
              into, such as 'USD,EUR'. This parameter is optional and allows
              retrieving values in multiple fiat currencies.
            example: usd,eur,gbp
          description: >-
            A comma-separated list of currency symbols to convert the amount
            into, such as 'USD,EUR'. This parameter is optional and allows
            retrieving values in multiple fiat currencies.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: >-
                      Numeric status code indicating success or failure of the
                      API call
                    example: 200
                  msg:
                    type: string
                    description: Human-readable message describing the API result or error
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        bridgeId:
                          type: string
                          description: Unique identifier for a bridge service
                          example: '100'
                        bridgeName:
                          type: string
                          description: Human-readable bridge service name
                        srcChainId:
                          type: string
                          description: Source blockchain network ID
                          example: '1'
                        dstChainId:
                          type: string
                          description: Destination blockchain network ID
                          example: '1'
                        srcTokenSymbol:
                          type: string
                          description: Symbol of the source token
                          example: usdt
                        dstTokenSymbol:
                          type: string
                          description: Symbol of the destination token
                          example: ETH
                        amountIn:
                          type: string
                          description: Amount of input token in a swap
                          example: '10000'
                        amountsOut:
                          type: array
                          items:
                            type: string
                          description: Expected output amounts from swaps or conversions
                      required:
                        - bridgeId
                        - bridgeName
                        - srcChainId
                        - dstChainId
                        - srcTokenSymbol
                        - dstTokenSymbol
                        - amountIn
                        - amountsOut
                example:
                  status: 200
                  msg: success
                  data:
                    - bridgeId: '500'
                      bridgeName: StargateV2
                      srcChainId: '56'
                      dstChainId: '1'
                      srcTokenSymbol: USDT
                      dstTokenSymbol: USDT
                      amountIn: '1000000000000000000'
                      amountsOut:
                        - '1000000000000000000'
                        - '1000000'
                      prices:
                        usd:
                          - chainId: '56'
                            USDT: '0.9992507012416009'
                          - chainId: '1'
                            USDT: '1.0000333901609484'
                    - bridgeId: '400'
                      bridgeName: AllbridgeCore
                      srcChainId: '56'
                      dstChainId: '1'
                      srcTokenSymbol: USDT
                      dstTokenSymbol: USDT
                      amountIn: '1000000000000000000'
                      amountsOut:
                        - '1000000000000000000'
                        - '997501'
                      prices:
                        usd:
                          - chainId: '56'
                            USDT: '0.9992507012416009'
                          - chainId: '1'
                            USDT: '1.0000333901609484'
                    - bridgeId: '600'
                      bridgeName: SquidRouterV2
                      srcChainId: '56'
                      dstChainId: '1'
                      srcTokenSymbol: USDT
                      dstTokenSymbol: USDT
                      amountIn: '1000000000000000000'
