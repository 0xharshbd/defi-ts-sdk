            Address of the paymaster sponsoring the transaction, plus any
            additional data sent to the paymaster. Leave empty for
            self-sponsored transactions.
        - name: userOps
          in: query
          required: true
          schema:
            type: string
            description: >-
              Array of user operation objects as per ERC-4337. Defines one or
              more operations to bundle.
            example:
              - sender: '0x03D3a52d79eeB5014dFe28258e8c0978Ecd8e65c'
                nonce: '0'
                initCode: 0x
                callData: >-
                  
                callGasLimit: '260611'
                gasLimit: '362451'
                verificationGasLimit: '362451'
                preVerificationGas: '53576'
                maxFeePerGas: '29964445250'
                maxPriorityFeePerGas: '100000000'
                paymasterAndData: 0x
                signature: >-
                  0x06ba793e154877ba4beff535372f70be6d2ebb5503f374297658caa13a114b5b29b5a45cd4835176e637018823bba5990b6f043f93fe792a5bdb2a09958ecca61c
          description: >-
            Array of user operation objects as per ERC-4337. Defines one or more
            operations to bundle.
        - name: bundler
          in: query
          required: true
          schema:
            type: string
            description: >-
              The address of the bundler or beneficiary responsible for
              executing the user operations.
            example: '0x6Fb447Ae94F5180254D436A693907a1f57696900'
          description: >-
            The address of the bundler or beneficiary responsible for executing
