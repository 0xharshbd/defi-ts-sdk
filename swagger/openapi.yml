  /defi/v1/yieldaggregator/getvaults:
    get:
      tags:
        - yieldaggregator
      summary: Get Vaults
      description: >-
        Fetches vault information (APY, fees, performance) for yield-generating
        opportunities across supported blockchains.


        > 💡 

        **Compute Unit Value:** `115` (Fixed)
      operationId: yieldaggregatorGetvaults
      parameters:
        - name: yieldAggregatorId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the yield aggregator for queries or
              transactions.
            enum:
              - '5000'
              - '5001'
              - '5002'
              - '5003'
              - '5100'
            example: '5000'
          description: >-
            The unique ID to specify the yield aggregator for queries or
            transactions.
        - name: tokenAddress
          in: query
          required: true
          schema:
            type: string
            description: The address of the token.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: The address of the token.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    tokenVaults:
                      - vaultAddress: '0xFE09e53A81Fe2808bc493ea64319109B5bAa573e'
                        apy: '4.08'
                        poolAddress: '0x3DA9D911301f8144bdF5c3c67886e5373DCdff8e'
  /defi/v1/yieldaggregator/withdrawpool:
