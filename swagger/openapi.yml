  /defi/v1/chain/getgasfees:
    get:
      tags:
        - chain
      summary: Get Gas Fees
      description: >-
        Retrieves detailed gas fee metrics for a specified user address over a
        defined block range, including total fees spent and current gas prices.


        > 💡 

