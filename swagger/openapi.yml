        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    sender: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
                    nonce: '0'
                    initCode: 0x
                    callData: >-
                      
                    callGasLimit: '260611'
                    gasLimit: '362451'
                    verificationGasLimit: '362451'
                    preVerificationGas: '53576'
                    maxFeePerGas: '29964445250'
                    maxPriorityFeePerGas: '100000000'
                    paymasterAndData: 0x
                    signature: 0x
  /defi/v1/aa/getpaymasterdata:
    get:
      tags:
        - aa
