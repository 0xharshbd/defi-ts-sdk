          type: string
          description: Public address of the sender initiating the transaction.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        market:
          type: string
          description: >-
            Defines the market or asset standard (e.g., USDC or WETH) to be used
            in the transaction. If not provided, the default market is set to
            USDC.
          example: USDC
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - actions
        - data
        - from
      description: The request body for a /defi/v1/lendborrow/bundleactions
      example:
        lendborrowId: '1300'
        actions: ACTION_SUPPLY_NATIVE_TOKEN
        data: >-
          0x40e53eb7000000000000000000000000000000000000000000000000000000000016e360
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas: '100000'
        gasPriority: low
        market: USDC
        enableFee: false
