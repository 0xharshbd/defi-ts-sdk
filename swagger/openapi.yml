openapi: 3.0.0
info:
  contact:
    name: Blockdaemon
    email: info@blockdaemon.com
  description: >-
    The Blockdaemon DeFi API provides a single interface to a multitude of DeFi
    projects and blockchains
  title: Blockdaemon DeFi API
  version: 1.0.0
  x-logo:
    altText: Blockdaemon logo
    backgroundColor: '#fafafa'
    url: >-
      https://storage.googleapis.com/blockdaemon-app-static-images/marketing/PNG/dark-logo.png
externalDocs:
  description: Blockdaemon DeFi documentation
  url: http://www.blockdaemon.com/api/defi
servers:
  - url: https://svc.blockdaemon.com
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        `X-API-Key: <Token>` header must be set to authenticate API requests.You
        can create tokens in the "Configure" tab of your API access area at
        https://app.blockdaemon.com.
  schemas:
    _aa_senduserops_Request:
      type: object
      properties:
        chainId:
          type: string
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          enum:
            - '1'
            - '56'
            - '43114'
            - '137'
            - '250'
            - '10'
            - '11155420'
            - '42161'
            - '421614'
            - '25'
            - '338'
            - '84532'
            - '8453'
            - '43113'
            - '97'
            - '80002'
            - '300'
            - '324'
          example: '1'
        chainSymbol:
          type: string
          description: The abbreviated chain name for queries or transactions.
          example: ETH
        userOps:
          type: array
          items:
            type: string
          description: >-
            Array of user operation objects as per ERC-4337. Defines one or more
            operations to bundle.
        bundler:
          type: string
          description: >-
            The address of the bundler or beneficiary responsible for executing
            the user operations.
          example: '0x6Fb447Ae94F5180254D436A693907a1f57696900'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
      required:
        - userOps
        - bundler
      description: The request body for a /defi/v1/aa/senduserops
      example:
        chainId: '1'
        chainSymbol: ETH
        bundler: '0x6Fb447Ae94F5180254D436A693907a1f57696900'
        gas: '100000'
    _bridge_addliquidity_Request:
      type: object
      properties:
        bridgeId:
          type: string
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
          enum:
            - '100'
            - '500'
          example: '100'
        srcChainId:
          type: string
          description: >-
            Chain ID of the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        srcTokenSymbol:
          type: string
          description: Symbol of the token to add liquidity
          example: usdt
        srcTokenAddress:
          type: string
          description: Address of the token to add liquidity
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from:
          type: string
          description: Address of the token sender.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountIn:
          type: string
          description: Amount of token to add as liquidity.
          example: '10000'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        srcChainSymbol:
          type: string
          description: Symbol of the source chain
          example: ETH
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - from
        - amountIn
      description: The request body for a /defi/v1/bridge/addliquidity
      example:
        bridgeId: '100'
        srcChainId: '1'
        srcTokenSymbol: usdt
        srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountIn: '10000'
        gas: '100000'
        srcChainSymbol: ETH
        gasPriority: low
        enableFee: false
    _bridge_removeliquidity_Request:
      type: object
      properties:
        bridgeId:
          type: string
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
          enum:
            - '100'
            - '500'
          example: '100'
        srcChainId:
          type: string
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        srcTokenSymbol:
          type: string
          description: Symbol of the token to remove liquidity.
          example: usdt
        srcTokenAddress:
          type: string
          description: Address of the token to remove liquidity.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from:
          type: string
          description: Address of the token sender.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountOut:
          type: string
          description: Amount of token to remove liquidity.
          example: '10000'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        srcChainSymbol:
          type: string
          description: Symbol of the source chain.
          example: ETH
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
        to:
          type: string
          description: Address of the token recipient.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
      required:
        - from
        - amountOut
        - to
      description: The request body for a /defi/v1/bridge/removeliquidity
      example:
        bridgeId: '100'
        srcChainId: '1'
        srcTokenSymbol: usdt
        srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountOut: '10000'
        gas: '100000'
        srcChainSymbol: ETH
        gasPriority: low
        enableFee: false
        to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
    _bridge_swap_Request:
      type: object
      properties:
        bridgeId:
          type: string
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
          enum:
            - '100'
            - '600'
            - '300'
            - '400'
            - '500'
          example: '100'
        srcTokenSymbol:
          type: string
          description: Symbol of the token to swap.
          example: usdt
        dstChainId:
          type: string
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        amountIn:
          type: string
          description: Amount of the token to be swapped.
          example: '10000'
        from:
          type: string
          description: Address of the token sender.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountOutMin:
          type: string
          description: Minimum amount accepted as the result of the swap.
          example: '0'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        to:
          type: string
          description: Address of the token recipient.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenSymbol:
          type: string
          description: Symbol of the token to be received after the swap.
          example: ETH
        srcChainId:
          type: string
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        srcChainSymbol:
          type: string
          description: Symbol of the source chain.
          example: ETH
        srcTokenAddress:
          type: string
          description: Address of the source token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress:
          type: string
          description: Address of the destination token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        slippage:
          type: string
          description: >-
            Percentage of the total swap value. Defaults to 1. Valid range: 0 <=
            slippage <= 100.
          example: '10'
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
        batchOption:
          type: string
          description: The batch option to be used for the transaction.
          example: eip5792
        transferMode:
          type: string
          description: >-
            Specifies the mode of token transfer. The first is taxi, where
            tokens are sent to the destination chain at the moment of swap. The
            second is bus ride. Bus ride means that multiple user swaps are
            batched together. 
          example: bus
      required:
        - dstChainId
        - amountIn
        - from
        - to
        - srcChainId
      description: The request body for a /defi/v1/bridge/swap
      example:
        bridgeId: '100'
        srcTokenSymbol: usdt
        dstChainId: '1'
        amountIn: '10000'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountOutMin: '0'
        gas: '100000'
        to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenSymbol: ETH
        srcChainId: '1'
        srcChainSymbol: ETH
        srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        slippage: '10'
        gasPriority: low
        enableFee: false
        batchOption: eip5792
        transferMode: bus
    _bridge_unlock_Request:
      type: object
      properties:
        bridgeId:
          type: string
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
          enum:
            - '300'
          example: '300'
        srcChainId:
          type: string
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        dstChainId:
          type: string
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        dstTokenSymbol:
          type: string
          description: Symbol of the destination token.
          example: ETH
        dstTokenAddress:
          type: string
          description: Address of the destination token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amount:
          type: string
          description: Amount of the token to unlock.
          example: '10000'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        gasPriority:
          type: string
          description: 'Priority level for gas: low, medium, or high.'
          example: low
        receiver:
          type: string
          description: Address of the token receiver.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        primarySignature:
          type: string
          description: Signature required for EVM to EVM unlock transactions.
          example: >-
            0x426361bb4b3317c04cf61ea9f1b1c736568e37468e042fb485905c984e8f548d2424ebbe6e89762a9d5925140acfacdb789bdc029f4d7095cc982b94530e73211b
        secondarySignature:
          type: string
          description: >-
            Signature required for Stellar to EVM or vice versa unlock
            transactions.
          example: >-
            0xb41459682c24b425f86a3d3d24f7c424025a01a92413cdaa028519c4aa8023ac38a9f23e37b97c9fa2da99f4292d647d0494f23c94658828f8846bcba8164b4b1c
        lockId:
          type: string
          description: Unique lock ID for the transaction.
          example: '2344087691488240225697848222060823058'
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - srcChainId
        - dstChainId
        - dstTokenSymbol
        - dstTokenAddress
        - amount
        - receiver
        - primarySignature
        - lockId
      description: The request body for a /defi/v1/bridge/unlock
      example:
        bridgeId: '300'
        srcChainId: '1'
        dstChainId: '1'
        dstTokenSymbol: ETH
        dstTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amount: '10000'
        gas: '100000'
        gasPriority: low
        receiver: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        primarySignature: >-
          0x426361bb4b3317c04cf61ea9f1b1c736568e37468e042fb485905c984e8f548d2424ebbe6e89762a9d5925140acfacdb789bdc029f4d7095cc982b94530e73211b
        secondarySignature: >-
          0xb41459682c24b425f86a3d3d24f7c424025a01a92413cdaa028519c4aa8023ac38a9f23e37b97c9fa2da99f4292d647d0494f23c94658828f8846bcba8164b4b1c
        lockId: '2344087691488240225697848222060823058'
        enableFee: false
    _bridge_swapaggregator_Request:
      type: object
      properties:
        srcChainId:
          type: string
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        dstChainId:
          type: string
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        srcChainSymbol:
          type: string
          description: Symbol of the source chain.
          example: ETH
        srcTokenSymbol:
          type: string
          description: Symbol of the token to swap.
          example: usdt
        dstTokenSymbol:
          type: string
          description: Symbol of the token to be received after the swap.
          example: ETH
        amountIn:
          type: string
          description: Amount of the token to be swapped.
          example: '10000'
        srcTokenAddress:
          type: string
          description: Address of the source token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress:
          type: string
          description: Address of the destination token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from:
          type: string
          description: Address of the sender of the token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        to:
          type: string
          description: Address of the recipient of the token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        excludedBridges:
          type: string
          description: Comma-separated values of bridges to exclude.
          example: '200'
        bestNetPrice:
          type: boolean
          description: >-
            If true, sorts prepared transactions by net value (amountsOut minus
            gas) in descending order. If multiple sort parameters are true,
            bestNetPrice takes precedence.
          example: false
        bestQuote:
          type: boolean
          description: >-
            If true, sorts prepared transactions by amountsOut in descending
            order. If multiple sort parameters are true, bestNetPrice takes
            precedence.
          example: false
        lowestGas:
          type: boolean
          description: >-
            If true, sorts prepared transactions by gas cost in ascending order.
            If multiple sort parameters are true, bestNetPrice takes precedence.
          example: false
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
        batchOption:
          type: string
          description: The batch option to be used for the transaction.
          example: eip5792
      required:
        - dstChainId
        - amountIn
        - from
        - to
      description: The request body for a /defi/v1/bridge/swaps
      example:
        srcChainId: '1'
        dstChainId: '1'
        srcChainSymbol: ETH
        srcTokenSymbol: usdt
        dstTokenSymbol: ETH
        amountIn: '10000'
        srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas: '100000'
        to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        excludedBridges: '200'
        bestNetPrice: false
        bestQuote: false
        lowestGas: false
        gasPriority: low
        enableFee: false
        batchOption: eip5792
    _bridge_swapwithapproval_Request:
      type: object
      properties:
        bridgeId:
          type: string
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
