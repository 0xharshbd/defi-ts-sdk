  /defi/v1/dex/gethistoricaltimeseries:
    get:
      tags:
        - dex
      summary: Get Historical Time Series
      description: >-
        Retrieves a chronological series of historical price data (transaction
        hash, timestamp, trade price) for a specified DEX pool. This time series
        data supports thorough price analysis, backtesting, and liquidity
        monitoring, enabling more informed DeFi strategies.


        > 💡 

        **Compute Unit Value:** `100` (Fixed)
      operationId: dexGethistoricaltimeseries
      parameters:
        - name: dexId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the decentralized exchange (DEX) within a
              particular blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
            enum:
              - '1000'
              - '1300'
              - '1305'
              - '1306'
              - '1307'
              - '1308'
              - '1309'
              - '1100'
              - '1200'
              - '1201'
            example: '1000'
          description: >-
            The unique ID to specify the decentralized exchange (DEX) within a
            particular blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
        - name: endBlock
          in: query
          required: false
          schema:
            type: string
            description: Last block of the range.
            example: '100010'
          description: Last block of the range.
        - name: startBlock
          in: query
          required: false
          schema:
            type: string
            description: Starting block of the range.
            example: '100000'
          description: Starting block of the range.
        - name: poolAddress
          in: query
          required: true
          schema:
            type: string
            description: Pool address whose liquidity is to be fetched.
            example: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
          description: Pool address whose liquidity is to be fetched.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
