  /defi/v1/fungibletoken/getuserallowance:
    get:
      tags:
        - fungibletoken
      summary: Get User Allowance
      description: >-
        Retrieves the approved allowance for a specific ERC-20 token, indicating
        how many tokens a designated spender is authorized to withdraw from an
        owner’s wallet. It is especially useful for verifying spending limits
        before initiating transactions, ensuring that decentralized applications
        or swap interfaces can confirm the available allowance for token
        transfers.


        > 💡 

        **Compute Unit Value:** `60` (Fixed)
      operationId: accountV1Allowance_legacy
      parameters:
        - name: tokenAddress
          in: query
          required: true
          schema:
            type: string
            description: Address of the token whose allowance is being queried.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: Address of the token whose allowance is being queried.
        - name: owner
          in: query
          required: true
          schema:
            type: string
            description: Public address of the owner of the tokens.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Public address of the owner of the tokens.
        - name: spender
          in: query
          required: true
          schema:
            type: string
            description: >-
              Public address of the spender authorized to withdraw tokens on the
              owner's behalf.
            example: '0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D'
          description: >-
            Public address of the spender authorized to withdraw tokens on the
            owner's behalf.
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '1'
              - '56'
              - '43114'
              - '137'
