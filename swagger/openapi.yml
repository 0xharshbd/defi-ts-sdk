  /defi/v1/chain/getevents:
    get:
      tags:
        - chain
      summary: Get Events
      description: >-
        Retrieves blockchain events emitted within a specified ledger range (up
        to 10 hours from the latest ledger), providing detailed information on
        event types, ledger numbers, closing times, and unique identifiers. It
        returns structured data with topics and values that help developers
        monitor on-chain activities, debug smart contract interactions, and
        track blockchain state changes.


        > 💡 

        **Compute Unit Value:** `10` (Fixed)
      operationId: chainGetevents
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '1700'
              - '1701'
              - '1500'
              - '1501'
            example: '1700'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: contractAddress
          in: query
          required: true
          schema:
            type: string
            description: Public address of the user.
            example: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
          description: Public address of the user.
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
