  /defi/v1/chain/getstakepositions:
    get:
      tags:
        - chain
      summary: Get Stake Positions
      description: >-
        Retrieves details about staked native assets for a specified address,
        including the total amount staked across all validators and a breakdown
        of each position. For every stake, it provides the staked amount,
        staker/withdrawer addresses, validator ID, rent-exempt reserve, and
        activation/deactivation epochs for thorough monitoring and auditing.


        > 💡 

        **Compute Unit Value:** `30` (Fixed)
      operationId: chainGetstakepositions
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '900'
              - '901'
              - '1100'
              - '1200'
            example: '900'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: address
          in: query
          required: true
          schema:
            type: string
            description: Public address of the user.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Public address of the user.
        - name: validatorAddress
          in: query
          required: false
          schema:
            type: string
            description: Address of the validator associated with the staked position.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Address of the validator associated with the staked position.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    totalStake: '721886'
                    stakePositions:
                      - stake: '721886'
                        staker: FbXAffyRzZFSM8zRY7yWmCk99pGCUWGS5eoSnywYLhhJ
