  /defi/v1/bridge/getsignature:
    get:
      tags:
        - bridge
      summary: Get Signature
      description: >-
        Retrieves the signature and transaction metadata for a cross-chain swap
        identified by its transaction hash. The response includes chain IDs,
        locked token amounts, the recipient address, and a cryptographic
        signature, enabling dApps to validate or finalize the swap on the
        destination chain.


        > 💡 

        **Compute Unit Value:** `40` (Fixed)
      operationId: bridgeGetsignature
      parameters:
        - name: bridgeId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the bridge protocol for routing
              cross-chain queries or transactions. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
            enum:
              - '300'
            example: '300'
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
        - name: transactionHash
          in: query
          required: true
          schema:
            type: string
            description: The unique identifier (hash) of the blockchain transaction.
            example: '0x7a69b73a9617b13663c5db08b0e371866b7bbf2b49866e61c2fe8303e07f7094'
          description: The unique identifier (hash) of the blockchain transaction.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    block: '19912625'
                    lockId: '1560796505155024044581883139481320798'
                    srcChainId: '1'
                    dstChainId: '56'
                    srcToken: >-
                      0xa11bd36801d8fa4448f0ac4ea7a62e3634ce8c7c000000000000000000000000
                    amount: '4720825560495'
                    receiver: '0x65a8f07bd9a8598e1b5b6c0a88f4779dbc077675'
                    primarySignature: >-
                      0x2731e3f1a9385f1fec164b4e4c5745763faddfdc544c725bed6dc64ae1fc8758787250ccb12467ee27c6aa2c6b331ea483104bdb5aeba802f7f50d9f31580d851c
