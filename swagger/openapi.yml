  /defi/v1/yieldaggregator/getbalance:
    get:
      tags:
        - yieldaggregator
      summary: Get Balance
      description: >-
        Retrieves a user’s current liquidity balance and position within
        yield-generating vaults or pools across supported protocols and
        blockchain networks. This endpoint returns a numeric value representing
        the total liquidity available for the given address, with detailed
        breakdowns of both vault and pool balances. Users can query their
        balance either by providing a direct vaultAddress or by supplying a
        tokenAddress along with a vaultNumber, in addition to required
        parameters such as the user’s public address and yieldAggregatorId. This
        comprehensive data is essential for developers and users seeking to
        monitor yield positions, manage liquidity, track earned yields, and
        integrate real-time yield data into DeFi portfolio management and
        performance analytics tools.


        > 💡 

        **Compute Unit Value:** `25` (Fixed)
      operationId: yieldaggregatorGetbalance
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
            description: >-
              The public blockchain address of the user whose liquidity balance
              is being queried. This value specifies the owner of the tokens
              deposited in the yield aggregator.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: >-
            The public blockchain address of the user whose liquidity balance is
            being queried. This value specifies the owner of the tokens
            deposited in the yield aggregator.
        - name: tokenAddress
          in: query
          required: false
          schema:
            type: string
            description: >-
              The contract address of the token. Use this parameter when
              querying by token, in combination with vaultNumber, if the
              vaultAddress is not provided.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: >-
            The contract address of the token. Use this parameter when querying
            by token, in combination with vaultNumber, if the vaultAddress is
            not provided.
        - name: vaultNumber
          in: query
          required: false
          schema:
            type: string
            description: >-
              The identifier for the specific vault holding the token, used when
              multiple vaults exist for the same token. Provide this along with
              tokenAddress if not directly specifying vaultAddress.
            example: '1'
          description: >-
            The identifier for the specific vault holding the token, used when
            multiple vaults exist for the same token. Provide this along with
            tokenAddress if not directly specifying vaultAddress.
        - name: yieldAggregatorId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the yield aggregator for queries or
              transactions.
            enum:
              - '5000'
              - '5001'
              - '5002'
              - '5003'
              - '5200'
              - '5201'
              - '5202'
              - '5203'
              - '5204'
              - '5100'
            example: '5000'
          description: >-
            The unique ID to specify the yield aggregator for queries or
            transactions.
        - name: vaultAddress
          in: query
          required: false
          schema:
            type: string
            description: >-
              The address of the yield vault. Use this parameter to directly
              query a specific vault instead of using tokenAddress and
              vaultNumber.
            example: '0xa258C4606Ca8206D8aA700cE2143D7db854D168c'
          description: >-
            The address of the yield vault. Use this parameter to directly query
            a specific vault instead of using tokenAddress and vaultNumber.
        - name: marketAddress
          in: query
          required: true
          schema:
            type: string
            description: >-
              The unique blockchain address that identifies the specific yield
              market or vault within the yield aggregator. This parameter
              directs the query to the appropriate liquidity pool where deposits
              are made.
            example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
          description: >-
            The unique blockchain address that identifies the specific yield
            market or vault within the yield aggregator. This parameter directs
            the query to the appropriate liquidity pool where deposits are made.
        - name: poolAddress
          in: query
          required: false
          schema:
            type: string
            description: Pool's address.
            example: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
          description: Pool's address.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    vaultBalance: '0'
                    poolBalance: '0'
