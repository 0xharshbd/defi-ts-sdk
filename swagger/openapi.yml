        **Compute Unit Value:** `5` (Fixed)
      operationId: aaGetuserops
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '1'
              - '56'
              - '43114'
              - '137'
              - '250'
              - '10'
              - '11155420'
              - '42161'
              - '421614'
              - '25'
              - '338'
              - '84532'
              - '8453'
              - '43113'
              - '97'
              - '80002'
              - '300'
              - '324'
            example: '1'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: sender
          in: query
          required: true
          schema:
            type: string
            description: >-
              Specifies the account or contract initiating the operation. If not
