  /defi/v1/chain/sendtransaction:
    post:
      tags:
        - chain
      summary: Send Transaction
      description: >-
        Submits a signed transaction to the blockchain for processing. This
        endpoint broadcasts the transaction data to the network and returns a
        unique transaction hash that can be used to track its confirmation
        status.


        > 💡 

        **Compute Unit Value:** `30` (Fixed)
      operationId: chainSendtransaction
      requestBody:
        required: true
        description: The request body for a /defi/v1/chain/sendtransaction
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_chain_sendtransaction_Request'
            example:
              chainId: '1'
              chainSymbol: ETH
              rawTransaction: >-
                0xf86f048433918fbe830493e0949b79d6dfe4650d70f35dbb80f7d1ec0cf7f823fd87038d7ea4c6800084022794382da0c9bd6b5c7e18a258b04039d524a3e1382ec0f522d160dc027428933f520b6868a07332736f1df297842299230820626f1fc5b8d4cdd602ade55e3ba02c63e756ce
              bdnTransaction: false
              mevProtection: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    chainId: '1'
                    transactionHash: >-
                      0x8375c5eedd17609292cecc051c18e180fa970b32a77011c48d3725e45e46e7b3
  /defi/v1/chain/simulatetransaction:
    post:
      tags:
        - chain
      summary: Simulate Transaction
      description: >-
        Simulates a signed transaction in the current network context without
        broadcasting, returning an encoded outcome, potential events, and
        resource cost metrics (CPU, memory). The response also includes the
        minimum resource fee and ledger number, enabling developers to verify,
        optimize, and confirm transaction behavior before committing funds.


        > 💡 

        **Compute Unit Value:** `50` (Fixed)
      operationId: chainSimulatetransaction
      requestBody:
        required: true
        description: The request body for a /defi/v1/chain/simulatetransaction
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_chain_simulatetransaction_Request'
            example:
              chainId: '1500'
              chainSymbol: ETH
