paths:
  /defi/v1/aa/getsignaturemessage:
    get:
      tags:
        - aa
      summary: Get Signature Message
      description: >-
        This endpoint retrieves a hexadecimal signature message that must be
        signed by the sender as part of the account abstraction process. The
        signed message serves as a critical authorization component for
        subsequent user operations on the blockchain.


        > 💡 

        **Compute Unit Value:** `15` (Fixed)
      operationId: aaGetsignaturemessage
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '1'
              - '56'
              - '43114'
              - '137'
              - '250'
              - '10'
              - '11155420'
              - '42161'
              - '421614'
              - '25'
              - '338'
              - '84532'
              - '8453'
              - '43113'
              - '97'
              - '80002'
              - '300'
              - '324'
            example: '1'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: sender
          in: query
          required: true
          schema:
            type: string
            description: On-chain wallet address.
            example: '0x03D3a52d79eeB5014dFe28258e8c0978Ecd8e65c'
          description: On-chain wallet address.
        - name: nonce
          in: query
          required: false
          schema:
            type: string
            description: Anti-replay parameter.
            example: '0'
          description: Anti-replay parameter.
        - name: initCode
          in: query
          required: false
          schema:
            type: string
            description: >-
              The initCode of the account. (needed if and only if the account is
              not yet on-chain and needs to be created)
            example: 0x
          description: >-
            The initCode of the account. (needed if and only if the account is
            not yet on-chain and needs to be created)
        - name: preVerificationGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              The amount of gas to pay for to compensate the bundler for
              pre-verification execution and calldata.
            example: '53576'
          description: >-
            The amount of gas to pay for to compensate the bundler for
            pre-verification execution and calldata.
        - name: verificationGasLimit
          in: query
          required: false
          schema:
            type: string
            description: The amount of gas to allocate for the verification step.
            example: '362451'
          description: The amount of gas to allocate for the verification step.
        - name: gasLimit
          in: query
          required: false
          schema:
            type: string
            description: Maximum gas limit provided by the sender, for the transaction.
            example: '10000'
          description: Maximum gas limit provided by the sender, for the transaction.
        - name: callGasLimit
          in: query
          required: false
          schema:
            type: string
            description: The amount of gas to allocate the main execution call.
            example: '260611'
          description: The amount of gas to allocate the main execution call.
        - name: callData
          in: query
          required: false
          schema:
            type: string
            description: >-
              Encoded data for executing the primary function call or operation
              within the user's transaction.
            example: >-
              
          description: >-
            Encoded data for executing the primary function call or operation
            within the user's transaction.
        - name: maxPriorityFeePerGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              Maximum priority fee per gas. (similar to EIP-1559
              max_priority_fee_per_gas)
            example: '100000000'
          description: >-
            Maximum priority fee per gas. (similar to EIP-1559
            max_priority_fee_per_gas)
        - name: maxFeePerGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              The maximum fee per gas to pay for the execution of this
              operation. (similar to EIP-1559 max_fee_per_gas)
            example: '29964445250'
          description: >-
            The maximum fee per gas to pay for the execution of this operation.
            (similar to EIP-1559 max_fee_per_gas)
        - name: paymasterAndData
          in: query
          required: false
          schema:
            type: string
            description: >-
              Address of paymaster sponsoring the transaction, followed by extra
              data to send to the paymaster. (empty for self-sponsored
              transaction)
            example: 0x
          description: >-
            Address of paymaster sponsoring the transaction, followed by extra
            data to send to the paymaster. (empty for self-sponsored
            transaction)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    messageToBeSigned: >-
                      0x4617338a3acd06271c356d52f8cfc260519e8e2115f0af41eb79b7ac13b1963c
  /defi/v1/aa/getuserops:
    get:
      tags:
        - aa
      summary: Get User Ops
