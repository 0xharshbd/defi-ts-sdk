  /defi/v1/bridge/swapaggregator:
    post:
      tags:
        - bridge
      summary: Aggregate Bridge Swap
      description: >-
        Aggregates swap quotes from all bridges supporting a specified token
        pair. It allows users to customize their query to prioritize either the
        best output or the lowest gas costs. The response provides detailed
        transaction data including bridge identifiers, output amounts, swap
        routing parameters (such as call data), gas estimates, and a reference,
        enabling traders to compare and select the most efficient swap route for
        their needs.


        > 💡 

        **Compute Unit Value:** `95` (Fixed)
      operationId: bridgeSwaps_legacy
      requestBody:
        required: true
        description: The request body for a /defi/v1/bridge/swapaggregator
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_bridge_swapaggregator_Request'
            example:
              srcChainId: '1'
              dstChainId: '1'
              srcChainSymbol: ETH
              srcTokenSymbol: usdt
              dstTokenSymbol: ETH
              amountIn: '10000'
              srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
              dstTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
              from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
              gas: '100000'
              to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
              excludedBridges: '200'
              bestNetPrice: false
              bestQuote: false
              lowestGas: false
              gasPriority: low
              enableFee: false
              batchOption: eip5792
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: >-
                      Numeric status code indicating success or failure of the
                      API call
                    example: 200
                  msg:
                    type: string
                    description: Human-readable message describing the API result or error
                  data:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            bridgeId:
                              type: string
                              description: Unique identifier for a bridge service
                              example: '100'
                            bridgeName:
                              type: string
                              description: Human-readable bridge service name
                            chainId:
                              type: string
                              description: >-
                                Blockchain network identifier (EVM chain ID,
                                Solana chain name, etc.)
                              example: '1'
                            from:
                              type: string
                              description: Sender's wallet address
                              example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
                            to:
                              type: string
                              description: Recipient's wallet address
                              example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
                            value:
                              type: string
                              description: >-
                                Amount being transferred or involved in a
                                transaction
                              example: '10'
                            gas:
                              type: string
                              description: Gas limit for the transaction
                              example: '100000'
                            data:
                              type: string
                              description: Main payload object or array returned by the API
                              example: >-
                                0x40e53eb7000000000000000000000000000000000000000000000000000000000016e360
                            gasPrice:
                              type: string
                              description: Price per gas unit for the transaction
                              example: '10000'
                            amountsOut:
                              type: string
                              description: >-
                                Expected output amounts from swaps or
                                conversions
                            estimationCheck:
                              oneOf:
                                - type: string
                                - type: boolean
                              description: >-
                                Flag or value indicating transaction
                                fee/estimate status
                            referenceId:
                              type: string
                              description: >-
                                Unique ID for tracking a specific transaction or
                                operation
                              example: 8eec8150896e4fdaa26d4d1a1338d676
                          required:
                            - bridgeId
                            - bridgeName
                            - chainId
                            - from
                            - to
                            - value
                            - gas
                            - data
                            - amountsOut
                            - estimationCheck
                            - referenceId
                      - type: object
                        properties:
                          createFeeTxn:
                            type: object
                            properties:
                              chainId:
                                type: string
                                description: >-
                                  Blockchain network identifier (EVM chain ID,
                                  Solana chain name, etc.)
                                example: '1'
                              from:
                                type: string
                                description: Sender's wallet address
                                example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
                              to:
                                type: string
                                description: Recipient's wallet address
                                example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
                              value:
                                type: string
                                description: >-
                                  Amount being transferred or involved in a
                                  transaction
                                example: '10'
                              gasPrice:
                                type: string
                                description: Price per gas unit for the transaction
                                example: '10000'
                              gas:
                                type: string
                                description: Gas limit for the transaction
                                example: '100000'
                            required:
                              - chainId
                              - from
                              - to
                              - value
                              - gas
                          swapaggregatorTxn:
                            type: array
                            items:
                              type: object
                              properties:
                                bridgeId:
                                  type: string
                                  description: Unique identifier for a bridge service
                                  example: '100'
                                bridgeName:
                                  type: string
                                  description: Human-readable bridge service name
                                chainId:
                                  type: string
                                  description: >-
                                    Blockchain network identifier (EVM chain ID,
                                    Solana chain name, etc.)
                                  example: '1'
                                from:
