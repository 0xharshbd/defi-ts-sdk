            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
          enum:
            - '600'
            - '300'
            - '400'
            - '100'
            - '500'
          example: '600'
        srcChainId:
          type: string
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        dstChainId:
          type: string
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          example: '1'
        srcTokenSymbol:
          type: string
          description: Symbol of the token to swap.
          example: usdt
        dstTokenSymbol:
          type: string
          description: Symbol of the token to be received after the swap.
          example: ETH
        srcTokenAddress:
          type: string
          description: Address of the source token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress:
          type: string
          description: Address of the destination token.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountIn:
          type: string
          description: Amount of the token to be swapped.
          example: '10000'
        amountOutMin:
          type: string
          description: Minimum amount accepted as the result of the swap.
          example: '0'
        from:
          type: string
          description: Address of the token sender.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        to:
          type: string
          description: Address of the token recipient.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        slippage:
          type: string
          description: >-
            Percentage of the total swap value. Defaults to 1. Valid range: 0 <=
            slippage <= 100.
          example: '10'
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
        batchOption:
          type: string
          description: The batch option to be used for the transaction.
          example: eip5792
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        srcChainSymbol:
          type: string
          description: Symbol of the source chain.
          example: ETH
      required:
        - dstChainId
        - amountIn
        - from
        - to
      description: The request body for a /defi/v1/bridge/swap-with-approval
      example:
        bridgeId: '600'
        srcChainId: '1'
        dstChainId: '1'
        srcTokenSymbol: usdt
        dstTokenSymbol: ETH
        srcTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstTokenAddress: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountIn: '10000'
        amountOutMin: '0'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gasPriority: low
        slippage: '10'
        enableFee: false
        batchOption: eip5792
        gas: '100000'
        srcChainSymbol: ETH
    _chain_createaccount_Request:
      type: object
      properties:
        chainId:
          type: string
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
          enum:
            - '1500'
            - '1501'
            - '1600'
            - '1601'
          example: '1500'
        chainSymbol:
          type: string
          description: The abbreviated chain name for queries or transactions.
          example: ETH
        from:
          type: string
          description: Public address of the sender funding the account.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        to:
          type: string
          description: Public address of the recipient who will receive the funds.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amount:
          type: string
          description: Amount of asset to fund the new account.
          example: '10000'
        destinationTag:
          type: string
          description: >-
            Optional tag for identifying the recipient's account on the
            XRPLedger.
          example: '10'
      required:
        - from
        - to
        - amount
      description: The request body for a /defi/v1/chain/createaccount
      example:
        chainId: '1500'
        chainSymbol: ETH
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        to: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amount: '10000'
        destinationTag: '10'
    _chain_registercoin_Request:
      type: object
      properties:
        chainId:
          type: string
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
