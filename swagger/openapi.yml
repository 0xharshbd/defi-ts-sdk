    _yieldaggregator_swap_Request:
      type: object
      properties:
        yieldAggregatorId:
          type: string
          description: >-
            The unique identifier used to route queries or transactions to the
            correct yield aggregator.
          enum:
            - '5200'
            - '5201'
            - '5202'
            - '5203'
            - '5204'
          example: '5200'
        marketAddress:
          type: string
          description: >-
            The blockchain address of the source yield market from which the
            tokens will be swapped. This address directs the swap to the
            appropriate liquidity pool within the aggregator.
          example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        from:
          type: string
          description: >-
            The public blockchain address of the user initiating the swap
            transaction. This address is used to identify the sender and debit
            the appropriate amount of tokens.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        path:
          type: array
          items:
            type: string
          description: >-
            An array of token addresses defining the swap route from input to
            output.
          example:
            - '0x514910771AF9Ca656af840dff83E8264EcF986CA'
            - '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
        amountIn:
          type: string
          description: >-
            The amount of tokens to swap, specified in the token's smallest
            denomination. This value represents the input amount for the swap
            operation.
          example: '10000'
        slippage:
          type: string
          description: >-
            The maximum allowable percentage deviation between the expected and
            executed swap price. Default is 1, meaning a 1% tolerance
            (acceptable range: 0 to 100).
          example: '10'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        enableAggregator:
          type: boolean
          description: >-
            Enable swap aggregator functionality to facilitate swaps between
            tokens that are not directly convertible with the underlying asset.
            Set this boolean flag to true to activate advanced routing logic for
            such conversions.
          example: false
        gasPriority:
          type: string
          description: >-
            Specifies the desired gas fee priority for the transaction.
            Acceptable values include 'low', 'medium', or 'high', and this
            setting can influence the speed and cost of the swap.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - marketAddress
        - from
        - path
        - amountIn
      description: The request body for a /defi/v1/yieldaggregator/swap
      example:
        yieldAggregatorId: '5200'
        marketAddress: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        path:
          - '0x514910771AF9Ca656af840dff83E8264EcF986CA'
          - '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
        amountIn: '10000'
        slippage: '10'
        gas: '100000'
        enableAggregator: false
        gasPriority: low
        enableFee: false
    _yieldaggregator_addliquidity_Request:
      type: object
      properties:
        yieldAggregatorId:
          type: string
          description: >-
            A unique identifier to route the transaction to the appropriate
            yield aggregator instance. This parameter is optional if a default
            aggregator is used.
          enum:
            - '5200'
            - '5201'
            - '5202'
            - '5203'
            - '5204'
          example: '5200'
        marketAddress:
          type: string
          description: >-
            The blockchain address of the liquidity pool or market where tokens
            will be deposited. This parameter directs the transaction to the
            correct pool within the yield aggregator.
          example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        tokenIn:
          type: string
          description: >-
            The address or identifier of the token being deposited. This
            parameter specifies the underlying asset that will be added as
            liquidity.
          example: '0x4db99b79361f98865230f5702de024c69f629fec'
        amount:
          type: string
          description: >-
            The quantity of the token to deposit into the liquidity pool. This
            value is specified in the token’s smallest denomination.
          example: '10000'
        from:
          type: string
          description: >-
            The public blockchain address of the user initiating the deposit.
            This is the account from which tokens will be debited.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountPtIn:
          type: string
          description: >-
            The optional amount of principal tokens (PT) to deposit, if
            applicable. Principal tokens represent the original asset value and
            may be required by certain protocols.
          example: '10000'
        slippage:
          type: string
          description: >-
            Specifies the maximum allowable percentage deviation between the
            expected and executed price during the deposit. This tolerance helps
            protect against unfavorable price movements during the transaction.
          example: '10'
        zeroPriceImpact:
          type: boolean
          description: >-
            When set to true, the transaction is executed to avoid any change in
            the asset's price, resulting in the user receiving both LP and YT
            tokens, though the LP amount will be lower than in standard mode.
          example: false
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        gasPriority:
          type: string
          description: >-
            Specifies the desired gas fee priority (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - marketAddress
        - tokenIn
        - amount
        - from
      description: The request body for a /defi/v1/yieldaggregator/addliquidity
      example:
        yieldAggregatorId: '5200'
        marketAddress: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        tokenIn: '0x4db99b79361f98865230f5702de024c69f629fec'
        amount: '10000'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountPtIn: '10000'
        slippage: '10'
        zeroPriceImpact: false
        gas: '100000'
        gasPriority: low
        enableFee: false
    _yieldaggregator_removeliquidity_Request:
      type: object
      properties:
        yieldAggregatorId:
          type: string
          description: >-
            A unique identifier to route the transaction to the appropriate
            yield aggregator instance. This parameter is optional if a default
            aggregator is used.
          enum:
            - '5200'
            - '5201'
            - '5202'
            - '5203'
            - '5204'
          example: '5200'
        marketAddress:
          type: string
          description: >-
            The blockchain address of the liquidity pool or market where tokens
            will be deposited. This parameter directs the transaction to the
            correct pool within the yield aggregator.
          example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        tokenOut:
          type: string
          description: >-
            The token that the user wishes to receive as a result of the
            liquidity removal. This parameter specifies which output token is
            desired when liquidity is withdrawn from the pool.
          example: '0x4db99b79361f98865230f5702de024c69f629fec'
        amountIn:
          type: string
          description: >-
            The amount of liquidity (or tokens) to remove from the pool,
            expressed in the token’s smallest denomination.
          example: '10000'
        from:
          type: string
          description: >-
            The public blockchain address of the user initiating the liquidity
            removal transaction. This address is used to debit the appropriate
            amount of tokens from the user’s account.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        isDual:
          type: boolean
          description: >-
            An optional flag indicating whether the liquidity removal should be
            executed in dual-token mode. If set to true, liquidity will be
            removed for both tokens in the pool according to the pool’s ratio;
            if false or omitted, only a single token (as specified by tokenOut)
            will be withdrawn.
          example: false
        slippage:
          type: string
          description: >-
            The maximum allowable percentage deviation between the expected and
            executed swap price. Default is 1, meaning a 1% tolerance
            (acceptable range: 0 to 100).
          example: '10'
        enableAggregator:
          type: boolean
          description: >-
            Enable swap aggregator functionality to facilitate swaps between
            tokens that are not directly convertible with the underlying asset.
            Set this boolean flag to true to activate advanced routing logic for
            such conversions.
          example: false
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        gasPriority:
          type: string
          description: >-
            Specifies the desired gas fee priority (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - marketAddress
        - tokenOut
        - amountIn
        - from
      description: The request body for a /defi/v1/yieldaggregator/removeliquidity
      example:
        yieldAggregatorId: '5200'
        marketAddress: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        tokenOut: '0x4db99b79361f98865230f5702de024c69f629fec'
        amountIn: '10000'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        isDual: false
        slippage: '10'
        enableAggregator: false
        gas: '100000'
        gasPriority: low
        enableFee: false
    _yieldaggregator_transferliquidity_Request:
      type: object
      properties:
        yieldAggregatorId:
          type: string
          description: >-
            A unique identifier to route the transaction to the correct yield
            aggregator instance. This parameter is optional if a default
            aggregator is used.
          enum:
            - '5200'
            - '5201'
            - '5202'
            - '5203'
            - '5204'
          example: '5200'
        marketAddress:
          type: string
          description: >-
            The blockchain address of the source market from which liquidity is
            being transferred.
          example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        from:
          type: string
          description: >-
            The public blockchain address of the user initiating the liquidity
            transfer.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstMarketAddress:
          type: string
          description: >-
            The blockchain address of the destination market where the liquidity
            will be deposited.
          example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        lpAmount:
          type: string
          description: >-
            The amount of liquidity provider (LP) tokens to transfer. This
            represents the portion of liquidity contributed by the user in the
            source market.
          example: '1000000000000000000'
        ptAmount:
          type: string
          description: >-
            The amount of principal tokens (PT) involved in the transfer.
            Principal tokens represent the original asset value deposited in the
            yield aggregator.
          example: '1000000000000000000'
        ytAmount:
          type: string
          description: >-
            The amount of yield tokens (YT) to transfer. Yield tokens represent
            the accrued yield from the user's deposit.
          example: '1000000000000000000'
        slippage:
          type: string
          description: >-
            Specifies the maximum acceptable percentage deviation between the
            expected and actual execution price during the liquidity removal.
            This helps protect against unfavorable price movements. The value is
            expressed as a percentage (e.g., 1 for 1%).
          example: '10'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        redeemRewards:
          type: boolean
          description: >-
            An optional flag indicating whether accrued rewards should be
            redeemed as part of the liquidity transfer transaction.
          example: false
        zeroPriceImpact:
          type: boolean
          description: >-
            When set to true, the transaction is executed to avoid any change in
            the asset’s price, resulting in the user receiving both LP and YT
            tokens, though the LP amount will be lower than in standard mode.
          example: false
        gasPriority:
          type: string
          description: >-
            Specifies the desired gas fee priority (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
      required:
        - marketAddress
        - from
        - dstMarketAddress
        - lpAmount
        - ptAmount
        - ytAmount
      description: The request body for a /defi/v1/yieldaggregator/transferliquidity
      example:
        yieldAggregatorId: '5200'
        marketAddress: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        dstMarketAddress: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
        lpAmount: '1000000000000000000'
        ptAmount: '1000000000000000000'
        ytAmount: '1000000000000000000'
        slippage: '10'
        gas: '100000'
        redeemRewards: false
        zeroPriceImpact: false
        gasPriority: low
        enableFee: false
    _yieldaggregator_withdrawvault_Request:
      type: object
      properties:
        amount:
          type: string
          description: >-
            The amount of tokens to withdraw from the yield vault, specified in
            the token's smallest denomination.
          example: '10000'
        from:
          type: string
          description: >-
            The public blockchain address of the account initiating the
            withdrawal.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas:
          type: string
          description: Maximum gas to be approved for the transaction.
          example: '100000'
        tokenAddress:
          type: string
          description: >-
            The smart contract address of the token. Use this parameter along
            with vaultNumber if you are not providing the vaultAddress directly.
          example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
        vaultNumber:
          type: string
          description: >-
            A numeric identifier for the specific vault (used when there are
            multiple vaults for the same token). Provide this along with
            tokenAddress if vaultAddress is not available.
          example: '1'
        vaultAddress:
          type: string
          description: >-
            The direct blockchain address of the yield vault to withdraw from.
            Use this parameter if you wish to directly specify the target vault
            instead of using tokenAddress and vaultNumber.
          example: '0xa258C4606Ca8206D8aA700cE2143D7db854D168c'
        yieldAggregatorId:
          type: string
          description: >-
            The unique ID to specify the yield aggregator for queries or
            transactions.
          enum:
            - '5000'
            - '5001'
            - '5002'
            - '5003'
            - '5100'
          example: '5000'
        gasPriority:
          type: string
          description: >-
            Specifies the priority level for gas fees (e.g., 'low', 'medium', or
            'high'), which influences the transaction speed and cost.
          example: low
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
        poolAddress:
          type: string
          description: Address of the liquidity pool.
          example: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
      required:
        - amount
        - from
      description: The request body for a /defi/v1/yieldaggregator/withdrawvault
      example:
        amount: '10000'
        from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        gas: '100000'
        tokenAddress: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
        vaultNumber: '1'
        vaultAddress: '0xa258C4606Ca8206D8aA700cE2143D7db854D168c'
        yieldAggregatorId: '5000'
        gasPriority: low
        enableFee: false
        poolAddress: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
