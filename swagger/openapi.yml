  /defi/v1/v1:
    get:
      tags:
        - v1
      summary: List Supported Tokens with Metadata
      description: >-
        Retrieves a list of tokens along with their metadata, such as the
        token's name, symbol, decimals, logo URI, and associated tags. This
        information is useful for displaying token details and allowing users to
        search or filter tokens based on specific criteria. Tags can be used to
        narrow down the returned tokens. Example: Use the tag `stablecoins` to
        only return stablecoin tokens.


        > 💡 

        **Compute Unit Value:** `60` (Fixed)
      operationId: tokensV1_legacy
      parameters:
        - name: chainID
          in: query
          required: false
          schema:
            type: string
            description: >-
              The CAIP-2 identifier for a blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains)
            example: false
          description: >-
            The CAIP-2 identifier for a blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains)
        - name: tokenAddress
          in: query
          required: false
          schema:
            type: string
            description: >-
              The address of an token contract to query. If omitted, all
              supported tokens will be queried.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: >-
            The address of an token contract to query. If omitted, all supported
