  /defi/v1/getapimetadatav2:
    get:
      tags:
        - getapimetadatav2
      summary: Get API Metadata
      description: >-
        Return the breakdown a breakdown of supported chains and protocol IDs
        for a given DeFi API endpoint.


        > 💡 

        **Compute Unit Value:** `100` (Fixed)
      operationId: getapimetadatav2_legacy
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
            description: >-
              Specifies the general API category. Valid values are `account`,
              `dex`, and `bridge`.
            example: dex
          description: >-
            Specifies the general API category. Valid values are `account`,
            `dex`, and `bridge`.
        - name: endpoint
          in: query
          required: true
          schema:
            type: string
            description: >
              Specifies the endpoint name within the selected category.
              Available options:


              - **`account` category:**
                - [`allowance`](https://docs.blockdaemon.com/reference/defi-account-allowance)
                - [`portfolio`](https://docs.blockdaemon.com/reference/defi-account-portfolio)

              - **`dex` category:**
                - [`price`](https://docs.blockdaemon.com/reference/defi-dex-get-price)
                - [`quotes`](https://docs.blockdaemon.com/reference/defi-dex-quote-aggregator)
                - [`swaps`](https://docs.blockdaemon.com/reference/defi-dex-swap-aggregator)
                - [`swap`](https://docs.blockdaemon.com/reference/defi-dex-swap)
                - [`swap-with-approval`](https://docs.blockdaemon.com/reference/defi-dex-swap-with-approval)

              - **`bridge` category:**
                - [`tokens`](https://docs.blockdaemon.com/reference/defi-bridge-tokens)
                - [`price`](https://docs.blockdaemon.com/reference/defi-bridge-get-price)
                - [`quotes`](https://docs.blockdaemon.com/reference/defi-bridge-quote-aggregator)
                - [`swaps`](https://docs.blockdaemon.com/reference/defi-bridge-swap-aggregator)
                - [`unlock`](https://docs.blockdaemon.com/reference/defi-bridge-unlock)
                - [`swap`](https://docs.blockdaemon.com/reference/defi-bridge-swap)
                - [`swap-with-approval`](https://docs.blockdaemon.com/reference/defi-bridge-swap-with-approval)
                - [`transactions`](https://docs.blockdaemon.com/reference/defi-bridge-get-transaction)
            example: getprice
          description: >
            Specifies the endpoint name within the selected category. Available
            options:


            - **`account` category:**
              - [`allowance`](https://docs.blockdaemon.com/reference/defi-account-allowance)
              - [`portfolio`](https://docs.blockdaemon.com/reference/defi-account-portfolio)

            - **`dex` category:**
              - [`price`](https://docs.blockdaemon.com/reference/defi-dex-get-price)
              - [`quotes`](https://docs.blockdaemon.com/reference/defi-dex-quote-aggregator)
              - [`swaps`](https://docs.blockdaemon.com/reference/defi-dex-swap-aggregator)
              - [`swap`](https://docs.blockdaemon.com/reference/defi-dex-swap)
              - [`swap-with-approval`](https://docs.blockdaemon.com/reference/defi-dex-swap-with-approval)

            - **`bridge` category:**
              - [`tokens`](https://docs.blockdaemon.com/reference/defi-bridge-tokens)
              - [`price`](https://docs.blockdaemon.com/reference/defi-bridge-get-price)
              - [`quotes`](https://docs.blockdaemon.com/reference/defi-bridge-quote-aggregator)
              - [`swaps`](https://docs.blockdaemon.com/reference/defi-bridge-swap-aggregator)
              - [`unlock`](https://docs.blockdaemon.com/reference/defi-bridge-unlock)
              - [`swap`](https://docs.blockdaemon.com/reference/defi-bridge-swap)
              - [`swap-with-approval`](https://docs.blockdaemon.com/reference/defi-bridge-swap-with-approval)
              - [`transactions`](https://docs.blockdaemon.com/reference/defi-bridge-get-transaction)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: >-
                      Numeric status code indicating success or failure of the
                      API call
                    example: 200
                  msg:
                    type: string
                    description: Human-readable message describing the API result or error
                  data:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            protocolName:
                              type: string
                              description: Name of a protocol or dApp
                            protocolLogo:
                              type: string
                              description: Logo URL of the protocol
                            protocolDescription:
                              type: string
                              description: Description of the protocol
                            supportedChains:
                              type: array
                              items:
                                type: object
                                properties:
                                  chainName:
                                    type: string
                                    description: Human-readable blockchain network name
                                  chainSymbol:
                                    type: string
                                    description: >-
                                      Symbol representing the chain (e.g., ETH,
                                      SOL)
                                    example: ETH
                                  chainId:
                                    type: string
                                    description: >-
                                      Blockchain network identifier (EVM chain
                                      ID, Solana chain name, etc.)
                                    example: '1'
                                  protocolId:
                                    type: string
                                    description: Unique identifier for a protocol
                                  chainLogo:
                                    type: string
                                    description: Logo URL of the chain
                                required:
                                  - chainName
                                  - chainSymbol
                                  - chainId
                                  - protocolId
                                  - chainLogo
                              description: >-
                                List of blockchain networks supported by a
                                protocol
                            curators:
                              type: array
                              items:
                                type: object
                                properties:
                                  curatorName:
                                    type: string
                                  curatorLogo:
                                    type: string
                                    nullable: true
                              description: List of curators associated with a protocol
                              required:
                                - curatorName
                                - curatorLogo
                          required:
                            - protocolName
                            - protocolLogo
                            - supportedChains
                      - type: object
                        properties:
                          supportedChains:
                            type: array
                            items:
                              type: object
                              properties:
                                chainName:
                                  type: string
                                  description: Human-readable blockchain network name
