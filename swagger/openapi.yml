  /defi/v1/chain/getbalance:
    get:
      tags:
        - chain
      summary: Get Balance
      description: >-
        retrieves the current token balance for a specified wallet address on
        supported blockchain networks, with optional filtering by asset codes
        and issuers. It returns precise balance data essential for real-time
        portfolio tracking, fee calculations, and wallet-related operations in
        decentralized applications


        > 💡 

        **Compute Unit Value:** `50` (Fixed)
      operationId: chainGetbalance
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '1'
              - '11155111'
              - '56'
              - '25'
              - '97'
              - '43114'
              - '338'
              - '900'
              - '901'
              - '1000'
              - '1002'
              - '1200'
              - '1201'
              - '43113'
              - '42161'
              - '421614'
              - '10'
              - '11155420'
              - '4002'
              - '324'
              - '300'
              - '1300'
              - '1301'
              - cosmoshub-4
              - '1600'
              - '1601'
              - '1700'
              - '1701'
              - osmosis-1
              - osmo-test-5
              - '1800'
              - '137'
              - '80002'
              - '250'
              - '8453'
              - '84532'
              - '1400'
              - '1401'
              - '400'
              - '401'
              - '1100'
              - '1101'
              - '1500'
              - '1501'
              - '17000'
              - '5000'
              - '5003'
              - '3637'
              - '3636'
              - '560048'
              - '8217'
              - '1001'
            example: '1'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: blockNumber
          in: query
          required: false
          schema:
            type: string
            description: >-
              Block number for which the balance needs to be retrieved. Defaults
              to the latest block if not specified.
            example: '100000'
          description: >-
            Block number for which the balance needs to be retrieved. Defaults
            to the latest block if not specified.
        - name: address
          in: query
          required: true
          schema:
            type: string
            description: The public address to get the balance of.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: The public address to get the balance of.
        - name: tokenAddress
          in: query
          required: false
          schema:
            type: string
            description: The address of the token to get the balance of.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: The address of the token to get the balance of.
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            description: >-
              Timestamp of the block number. Takes precedence over block number
              if both are provided.
            example: '1741869257'
          description: >-
            Timestamp of the block number. Takes precedence over block number if
            both are provided.
        - name: vsCurrencies
          in: query
          required: false
          schema:
            type: string
            description: >-
              A comma-separated list of currency symbols to convert the amount
              into, such as 'USD,EUR'. This parameter is optional and allows
              retrieving values in multiple fiat currencies.
            example: usd,eur,gbp
          description: >-
            A comma-separated list of currency symbols to convert the amount
            into, such as 'USD,EUR'. This parameter is optional and allows
            retrieving values in multiple fiat currencies.
        - name: issuer
          in: query
          required: false
          schema:
            type: string
            description: The public address of the issuer.
            example: GDM4RQUQQUVSKQA7S6EM7XBZP3FCGH4Q7CL6TABQ7B2BEJ5ERARM2M5M
          description: The public address of the issuer.
        - name: assetCode
          in: query
          required: false
          schema:
            type: string
            description: >-
              The code of the asset to get the balance of. Required if issuer
              address is provided.
            example: VELO
          description: >-
            The code of the asset to get the balance of. Required if issuer
            address is provided.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: >-
                      Numeric status code indicating success or failure of the
                      API call
                    example: 200
                  msg:
                    type: string
                    description: Human-readable message describing the API result or error
                  data:
                    type: object
                    properties:
                      balance:
                        type: string
                        description: Account or token balance
                      totalReceived:
                        type: string
                        description: Total received amount
                      totalSent:
                        type: string
                        description: Total sent amount
                      utxos:
                        type: array
                        items:
                          type: object
                          properties:
                            block:
                              type: string
                              pattern: ^-?(0|[1-9][0-9]*)$
                              description: Block number
                            txHash:
                              type: string
                              description: Transaction hash
                            value:
                              type: string
                              description: >-
                                Amount being transferred or involved in a
                                transaction
                              example: '10'
                            refBalance:
                              type: string
                              description: Reference balance at the time of UTXO
                            txInputN:
                              type: string
                              pattern: ^-?(0|[1-9][0-9]*)$
                              description: Transaction input index
                            txOutputN:
                              type: string
                              pattern: ^-?(0|[1-9][0-9]*)$
                              description: Transaction output index
                            confirmations:
                              type: string
                              description: Number of confirmations
                            spent:
                              type: boolean
                              description: Boolean indicating whether the UTXO is spent
                          required:
                            - block
                            - txHash
                            - value
                            - refBalance
                            - txInputN
                            - txOutputN
                            - confirmations
                          additionalProperties: false
                        description: List of unspent transaction outputs
                      assetCode:
                        type: string
                        description: Unique asset code (e.g., for Stellar or other chains)
                        example: VELO
                      issuer:
                        type: string
                        description: Entity or address issuing the token
                        example: >-
                          GDM4RQUQQUVSKQA7S6EM7XBZP3FCGH4Q7CL6TABQ7B2BEJ5ERARM2M5M
                      usdPrice:
                        type: string
                        pattern: ^(0|NA|[1-9]\d*)(\.\d+)?$
                        description: Price of the asset in USD
                        example: '4689.75'
                      logoUrl:
                        type: string
                        nullable: true
                        description: URL for the asset's logo
                      tags:
                        type: array
                        items:
                          type: string
                        nullable: true
                        description: List of category or classification tags
                      prices:
                        type: object
                        properties:
                          usd:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
                              minProperties: 1
                              maxProperties: 1
                            description: USD-denominated price or array of price points
                        required:
                          - usd
                        description: Price data object
                    required:
                      - balance
                    additionalProperties: false
                example:
                  status: 200
                  msg: success
                  data:
                    balance: '0'
                    usdPrice: '4603.59265991327'
                    prices:
                      usd:
                        - eth: '4603.59265991327'
                    logoUrl: >-
                      https://images.ctfassets.net/hwqnbx905qdp/KB7lTVf04F9d0YQx7Ui4h/589c2efc739b0babc0074dab61d11e71/eip155_1-0x0000000000000000000000000000000000000000.webp
                    tags:
                      - native
