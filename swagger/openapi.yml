  /defi/v1/bridge/getprice:
    get:
      tags:
        - bridge
      summary: Get Bridge Swap Price
      description: >-
        This endpoint provides a real‑time swap quotation for transferring
        tokens between two blockchain networks using a designated bridge. It
        calculates the estimated amount of destination tokens that you would
        receive based on a given input token amount and token pair, factoring in
        the current liquidity and fees across the specified source and
        destination chains.


        > 💡 

        **Compute Unit Value:** `40` (Fixed)
      operationId: bridgePrice_legacy
      parameters:
        - name: srcChainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique chain ID to specify the source chain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            example: '1'
          description: >-
            The unique chain ID to specify the source chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: bridgeId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the bridge protocol for routing
              cross-chain queries or transactions. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
            enum:
              - '600'
              - '300'
              - '400'
              - '500'
              - '100'
            example: '600'
          description: >-
            The unique ID to specify the bridge protocol for routing cross-chain
            queries or transactions. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-bridges-protocols).
        - name: dstChainId
          in: query
          required: true
          schema:
            type: string
            description: >-
              The unique chain ID to specify the destination chain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            example: '1'
          description: >-
            The unique chain ID to specify the destination chain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: srcTokenSymbol
          in: query
          required: false
          schema:
            type: string
            description: Symbol of the source token.
            example: usdt
          description: Symbol of the source token.
        - name: dstTokenSymbol
          in: query
          required: false
          schema:
            type: string
            description: Symbol of the destination token.
            example: ETH
          description: Symbol of the destination token.
        - name: srcTokenAddress
          in: query
          required: false
          schema:
            type: string
            description: Address of the source token.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Address of the source token.
        - name: dstTokenAddress
          in: query
          required: false
          schema:
            type: string
            description: Address of the destination token.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: Address of the destination token.
        - name: amountIn
          in: query
          required: true
          schema:
            type: string
            description: Amount of the source token to swap.
            example: '10000'
          description: Amount of the source token to swap.
        - name: vsCurrencies
          in: query
          required: false
          schema:
            type: string
            description: >-
              A comma-separated list of currency symbols to convert the amount
              into, such as 'USD,EUR'. This parameter is optional and allows
              retrieving values in multiple fiat currencies.
            example: usd,eur,gbp
          description: >-
            A comma-separated list of currency symbols to convert the amount
            into, such as 'USD,EUR'. This parameter is optional and allows
            retrieving values in multiple fiat currencies.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: >-
                      Numeric status code indicating success or failure of the
                      API call
                    example: 200
                  msg:
                    type: string
                    description: Human-readable message describing the API result or error
                  data:
                    type: object
                    properties:
                      srcChainId:
                        type: string
                        description: Source blockchain network ID
                        example: '1'
                      dstChainId:
                        type: string
                        description: Destination blockchain network ID
                        example: '1'
                      srcTokenSymbol:
                        type: string
                        description: Symbol of the source token
                        example: usdt
                      dstTokenSymbol:
                        type: string
                        description: Symbol of the destination token
                        example: ETH
                      amountIn:
                        type: string
                        description: Amount of input token in a swap
                        example: '10000'
                      amountsOut:
                        type: array
                        items:
                          type: string
                        description: Expected output amounts from swaps or conversions
                example:
                  status: 200
                  msg: success
                  data:
                    srcChainId: '1'
                    dstChainId: '10'
                    srcTokenSymbol: USDT
                    dstTokenSymbol: USDC
                    srcTokenAddress: '0xdac17f958d2ee523a2206206994597c13d831ec7'
                    dstTokenAddress: '0x0b2c639c533813f4aa9d7837caf62653d097ff85'
                    amountIn: '1000'
                    amountsOut:
                      - '1000'
                      - '1000339710295989'
                    prices:
                      usd:
                        - chainId: '1'
                          USDT: '1.0004228921119596'
                        - chainId: '1'
                          DAI: '0.9996480800961153'
