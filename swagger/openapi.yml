      summary: Get Storage
      description: >-
        Accesses and returns detailed storage data for a specified smart
        contract, including its state variables, code, and ledger entries. This
        endpoint leverages base64-encoded keys to accurately retrieve binary
        data from the contract’s storage, ensuring that complex on-chain state
        information is properly encoded and accessible.


