          type: string
          description: >-
            The unique ID to specify the lending and borrowing protocol for
            routing relevant queries or transactions.
          enum:
            - '1300'
            - '1302'
          example: '1300'
        actions:
          type: string
          description: >-
            An array of strings, where each string represents a specific lending
            or borrowing operation to execute.
          example: ACTION_SUPPLY_NATIVE_TOKEN
        data:
          type: string
          description: >-
            An array containing the encoded call data payloads corresponding to
            each action listed in the actions array. Each payload includes the
            parameters necessary for its respective operation.
          example: >-
            0x40e53eb7000000000000000000000000000000000000000000000000000000000016e360
