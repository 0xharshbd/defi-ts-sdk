  /defi/v1/dex/fillorder:
    post:
      tags:
        - dex
      summary: Fill Order
      description: >-
        Facilitates the execution (“filling”) of an existing limit order on a
        decentralized exchange by specifying the order ID, taker address, and
        offered token amount. The endpoint returns transaction data (chain ID,
        addresses, gas details, etc.) and a reference ID, enabling secure
        settlement of trades while providing a clear audit trail.


        > 💡 

        **Compute Unit Value:** `25` (Fixed)
      operationId: dexFillorder
      requestBody:
        required: true
        description: The request body for a /defi/v1/dex/fillorder
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_dex_fillorder_Request'
            example:
              dexId: '2200'
              orderId:
                - '95167'
              from: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
              amountIn: '10000'
              gas: '100000'
              gasPriority: low
              enableFee: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    chainId: '137'
                    from: '0x42a0eef97019bf6f15796fc9a015f681c581f77a'
                    to: '0xcab2FA2eeab7065B45CBcF6E3936dDE2506b4f6C'
                    value: '0'
                    data: >-
                      
                    gasPrice: '30000000029'
                    referenceId: 8a095c21d72b411ba742ab546042f716
  /defi/v1/dex/getactiveamount:
    get:
      tags:
        - dex
      summary: Get Active Amount
      description: >-
        Retrieves the active making amount of a specific token held by a maker.
        This endpoint returns the maker’s address, the token’s contract address,
        and the current active amount available for order execution. This active
        amount reflects the portion of the maker’s assets that are deployed in
        liquidity provision or trading on the decentralized exchange, providing
        crucial insight into market depth and the maker’s trading activity.


        > 💡 

        **Compute Unit Value:** `140` (Fixed)
      operationId: dexGetactiveamount
      parameters:
        - name: dexId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the decentralized exchange (DEX) within a
              particular blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
            enum:
              - '2200'
              - '2201'
              - '2202'
              - '2203'
              - '2204'
              - '2205'
              - '2206'
              - '2209'
            example: '2200'
          description: >-
            The unique ID to specify the decentralized exchange (DEX) within a
            particular blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
        - name: address
          in: query
          required: true
          schema:
            type: string
            description: >-
              The public address of the maker (user) whose active amount is
              being queried.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: >-
            The public address of the maker (user) whose active amount is being
            queried.
        - name: tokenAddress
          in: query
          required: true
          schema:
            type: string
            description: >-
              The address of the token for which the active amount is to be
              retrieved.
            example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
          description: >-
            The address of the token for which the active amount is to be
            retrieved.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                example:
                  status: 200
                  msg: success
                  data:
                    address: '0xB409cB0b5DB9f148d0bc491E140D9E0FDd789C11'
                    tokenAddress: '0x853d955acef822db058eb8505911ed77f175b99e'
                    activeMakingAmount: '400000000000000'
  /defi/v1/dex/gethistoricalpoolchartdata:
    get:
      tags:
        - dex
      summary: Get Historical Pool Chart Data
      description: >-
        Retrieves historical candlestick data (OHLCV) for a specified liquidity
        pool, capturing open, high, low, close, and volume metrics over
        customizable intervals. This robust chart data supports detailed price
        analysis, liquidity tracking, and strategy development for traders,
        analysts, and developers.


        > 💡 

        **Compute Unit Value:** `115` (Fixed)
      operationId: dexGethistoricalpoolchartdata
      parameters:
        - name: dexId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to specify the decentralized exchange (DEX) within a
              particular blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
            enum:
              - '1000'
              - '1300'
              - '1100'
              - '1500'
              - '1400'
            example: '1000'
          description: >-
            The unique ID to specify the decentralized exchange (DEX) within a
            particular blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-dexs-protocols).
        - name: interval
          in: query
          required: false
          schema:
            type: string
            description: >-
              Time interval for OHCLV data. Options: 15 mins (default), 30 mins,
              60 mins, or 90 mins.
            example: '5'
          description: >-
            Time interval for OHCLV data. Options: 15 mins (default), 30 mins,
            60 mins, or 90 mins.
        - name: limit
          in: query
          required: false
          schema:
            type: string
            description: Number of iterations. Start limit is 100 and maximum limit is 500.
            example: '10'
          description: Number of iterations. Start limit is 100 and maximum limit is 500.
        - name: poolAddress
          in: query
          required: true
          schema:
            type: string
            description: Pool address whose transactions are to be fetched.
            example: '0xfad57d2039c21811c8f2b5d5b65308aa99d31559'
          description: Pool address whose transactions are to be fetched.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
