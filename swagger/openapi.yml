            example: '0x03D3a52d79eeB5014dFe28258e8c0978Ecd8e65c'
          description: >-
            Specifies the account or contract initiating the operation. If not
            on-chain yet, the account may need to be created.
        - name: nonce
          in: query
          required: false
          schema:
            type: string
            description: Anti-replay parameter.
            example: '0'
          description: Anti-replay parameter.
        - name: initCode
          in: query
          required: false
          schema:
            type: string
            description: >-
              The initCode of the account. (needed if and only if the account is
              not yet on-chain and needs to be created)
            example: 0x
          description: >-
            The initCode of the account. (needed if and only if the account is
            not yet on-chain and needs to be created)
        - name: preVerificationGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              The amount of gas to pay for to compensate the bundler for
              pre-verification execution and calldata.
            example: '53576'
          description: >-
            The amount of gas to pay for to compensate the bundler for
            pre-verification execution and calldata.
        - name: verificationGasLimit
          in: query
          required: false
          schema:
            type: string
            description: >-
              Gas limit allocated for verifying the user operation, e.g.
              validating signatures and paymaster logic.
            example: '362451'
          description: >-
            Gas limit allocated for verifying the user operation, e.g.
            validating signatures and paymaster logic.
        - name: gasLimit
          in: query
          required: false
          schema:
            type: string
            description: Maximum gas limit for the overall user operation execution.
            example: '10000'
          description: Maximum gas limit for the overall user operation execution.
        - name: callGasLimit
          in: query
          required: false
          schema:
            type: string
            description: >-
              Gas limit allocated for the actual call execution in the user
              operation.
            example: '260611'
          description: >-
            Gas limit allocated for the actual call execution in the user
            operation.
        - name: callData
          in: query
          required: false
          schema:
            type: string
            description: >-
              The encoded data for the transaction function call or operation to
              be executed in this user operation.
            example: >-
              
          description: >-
            The encoded data for the transaction function call or operation to
            be executed in this user operation.
        - name: maxPriorityFeePerGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              For EIP-1559 transactions, this is the tip (priority fee) per gas
              to incentivize validators or bundlers.
            example: '100000000'
          description: >-
            For EIP-1559 transactions, this is the tip (priority fee) per gas to
            incentivize validators or bundlers.
        - name: maxFeePerGas
          in: query
          required: false
          schema:
            type: string
            description: >-
              For EIP-1559 transactions, this is the maximum total fee (base +
              priority) the sender is willing to pay per gas.
            example: '29964445250'
          description: >-
            For EIP-1559 transactions, this is the maximum total fee (base +
            priority) the sender is willing to pay per gas.
        - name: paymasterAndData
          in: query
          required: false
          schema:
            type: string
            description: >-
              Address of the paymaster sponsoring the transaction, plus any
              additional data sent to the paymaster. Leave empty for
