  /defi/v1/yieldaggregator/getmarketdata:
    get:
      tags:
        - yieldaggregator
      summary: Get Market Data
      description: >-
        Provides detailed financial metrics (liquidity, trading volume, token
        supply, PT, LP, SY) for a specified yield market. This snapshot helps
        users and developers monitor market performance and make informed DeFi
        decisions.


