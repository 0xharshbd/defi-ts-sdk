            - '2201'
            - '2202'
            - '2203'
            - '2204'
            - '2205'
            - '2206'
            - '2209'
          example: '2200'
        orderType:
          type: string
          description: >-
            The type of order to publish. Can be 'create' or 'cancel'. Defaults
            to 'create'.
          enum:
            - create
            - cancel
          example: create
        makerAsset:
          type: string
          description: The token address of the asset that the Maker is selling.
          example: '0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270'
        takerAsset:
          type: string
          description: The token address of the asset that the Maker expects in return.
          example: '0xc2132d05d31c914a87c6611c10748aeb04b58e8f'
        from:
          type: string
          description: The address of the sender (Maker) initiating the transaction.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        to:
          type: string
          description: The address of the recipient (Taker) for the transaction.
          example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
        amountIn:
          type: string
          description: The amount of the Maker asset being offered in the order.
          example: '10000'
        amountOut:
          type: string
          description: The expected amount of the Taker asset to be received.
          example: '10000'
        deadline:
          type: string
          description: >-
            The deadline for the transaction to be executed (in UNIX Timestamp
            format).
          example: '1707313948'
        orderId:
          type: boolean
          description: >-
            The unique identifier of the order to retrieve. Use this to fetch
            details for a specific order.
          example: '95167'
        salt:
          type: string
          description: >-
            A randomized value to prevent replay attacks, used as an additional
            input in hashing.
          example: '140518201020656697335313758999689041588'
        enableFee:
          type: boolean
          description: >-
            Flag to include a basis points fee transaction alongside the main
            transaction when set to true.
          example: false
