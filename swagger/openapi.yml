              transactions.
            enum:
              - '5200'
              - '5201'
              - '5202'
              - '5203'
              - '5204'
            example: '5200'
          description: >-
            The unique ID to specify the yield aggregator for queries or
            transactions.
        - name: marketAddress
          in: query
          required: true
          schema:
            type: string
            description: >-
              The blockchain address of the yield market or liquidity pool for
              which the market data is being requested. This parameter ensures
              that the query targets the correct market, returning metrics
              specific to that liquidity pool.
            example: '0xcdd26eb5eb2ce0f203a84553853667ae69ca29ce'
          description: >-
            The blockchain address of the yield market or liquidity pool for
            which the market data is being requested. This parameter ensures
            that the query targets the correct market, returning metrics
            specific to that liquidity pool.
