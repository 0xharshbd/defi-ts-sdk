  /defi/v1/chain/getusertransactions:
    get:
      tags:
        - chain
      summary: Get User Transactions
      description: >-
        Retrieves historical transaction details for one or more user addresses
        over a defined block range, including both simple native transfers and
        complex contract interactions. For each transaction, the response
        provides the hash, nonce, sender/receiver addresses, value, gas details,
        block info, and any ERC20/NFT/native token transfers, along with
        summaries, categorization (send, receive, etc.), and pagination via a
        next-page token.


        > 💡 

        **Compute Unit Value:** `245` (Fixed)
      operationId: chainGetusertransactions
      parameters:
        - name: chainId
          in: query
          required: false
          schema:
            type: string
            description: >-
              The unique ID to direct queries or transactions to the correct
              blockchain. Find more
              [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
            enum:
              - '43115'
              - '43116'
              - '43114'
              - '1'
              - '56'
              - '137'
              - '250'
              - '10'
              - '42161'
              - '25'
              - '8453'
              - '1100'
              - '1101'
              - '900'
              - '1500'
              - '1501'
              - '1600'
              - '1601'
              - '1700'
              - '1701'
              - '1800'
              - '1400'
            example: '43115'
          description: >-
            The unique ID to direct queries or transactions to the correct
            blockchain. Find more
            [here](https://docs.blockdaemon.com/docs/defi-api-supported-protocols#supported-chains).
        - name: chainSymbol
          in: query
          required: false
          schema:
            type: string
            description: The abbreviated chain name for queries or transactions.
            example: ETH
          description: The abbreviated chain name for queries or transactions.
        - name: address
          in: query
          required: true
          schema:
            type: string
            description: The public address of the user.
            example: '0xdAe2F6EdDdA6fb4fb60cc02633DE27e2b431B402'
          description: The public address of the user.
        - name: endBlock
          in: query
          required: false
          schema:
            type: string
            description: >-
              The ending block number from which to get the transactions. By
              default, the current block.
            example: '100010'
          description: >-
            The ending block number from which to get the transactions. By
            default, the current block.
        - name: startBlock
          in: query
          required: false
          schema:
            type: string
            description: >-
              The starting block number from which to get the transactions. By
              default, the Genesis block.
            example: '100000'
          description: >-
            The starting block number from which to get the transactions. By
            default, the Genesis block.
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
            description: The page cursor present at the top to fetch the next page.
            example: >-
              eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..y7FANxpXgtdgk83CIqPHHk2jutj1NZrueTu4XR39jnk
          description: The page cursor present at the top to fetch the next page.
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            description: The transaction sorting order. 'asc' or 'desc'. By default, desc.
            enum:
              - desc
              - asc
            example: desc
          description: The transaction sorting order. 'asc' or 'desc'. By default, desc.
        - name: pageSize
          in: query
          required: false
          schema:
            type: string
            description: >-
              The number of transactions to fetch per page. By default, 30. Max:
              100.
            example: '10'
          description: >-
            The number of transactions to fetch per page. By default, 30. Max:
            100.
        - name: fromTimestamp
          in: query
          required: false
          schema:
            type: string
            description: >-
              The start date (in seconds or date string) from which to get the
              transactions. If 'startBlock' is also provided, 'startBlock' will
              be used.
            example: '1741869257'
          description: >-
            The start date (in seconds or date string) from which to get the
            transactions. If 'startBlock' is also provided, 'startBlock' will be
            used.
        - name: toTimestamp
          in: query
          required: false
          schema:
            type: string
            description: >-
              The end date (in seconds or date string) from which to get the
              transactions. If 'endBlock' is also provided, 'endBlock' will be
              used.
            example: '1741969257'
          description: >-
            The end date (in seconds or date string) from which to get the
            transactions. If 'endBlock' is also provided, 'endBlock' will be
            used.
        - name: limit
          in: query
          required: false
          schema:
            type: string
            description: 'Maximum number of transactions in response. Maximum: 5.'
            example: '10'
          description: 'Maximum number of transactions in response. Maximum: 5.'
        - name: beforeBlock
          in: query
          required: false
          schema:
            type: string
            description: The block number before which the user wants the transactions.
            example: '100010'
          description: The block number before which the user wants the transactions.
        - name: afterBlock
          in: query
          required: false
          schema:
            type: string
            description: The block number after which the user wants the transactions.
            example: '100000'
          description: The block number after which the user wants the transactions.
      responses:
